services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/donate.db
      FRONTEND_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379/0
      API_URL: http://localhost:8000
      PROMPT_REPO_DIR: /app/prompt_repo
      DATA_DIR: /app/data
    volumes:
      - prompt_repo:/app/prompt_repo
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080

volumes:
  prompt_repo:
  app_data:
