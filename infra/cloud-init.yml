#cloud-config

package_update: true
package_upgrade: true

packages:
  - docker-compose-plugin
  - git
  - rsync

write_files:
  - path: /opt/donate/.env
    permissions: "0600"
    content: |
      ANTHROPIC_API_KEY=${anthropic_key}
      STRIPE=${stripe_key}
      SITE_URL=${site_url}
      DOMAIN=${domain}

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - mkdir -p /opt/donate/app
