services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/donate.db
      FRONTEND_URL: ${SITE_URL}
      SITE_URL: ${SITE_URL}
      REDIS_URL: redis://redis:6379/0
      API_URL: http://localhost:8000
      PROMPT_REPO_DIR: /app/prompt_repo
      DATA_DIR: /app/data
    volumes:
      - prompt_repo:/app/prompt_repo
      - app_data:/app/data
      - /opt/donate/.ssh:/app/.ssh:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_BACKEND_URL: ""
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  prompt_repo:
  redis_data:
  app_data:
  caddy_data:
  caddy_config:
